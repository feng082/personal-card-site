<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>内容管理</title>
    <meta name="description" content="个人名片网站后台管理。">
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body class="admin-body">
    <header class="site-header">
      <a class="brand" href="./index.html">返回首页</a>
      <nav class="nav" aria-label="后台导航">
        <button class="ghost-button" id="resetBtn" type="button">恢复默认</button>
        <button class="primary-button" id="saveBtn" type="button">保存到本机</button>
        <button class="primary-button" id="exportBtn" type="button">下载配置</button>
      </nav>
    </header>

    <main class="admin-shell">
      <section class="admin-title">
        <p class="kicker">Admin</p>
        <h1>内容管理</h1>
        <p>这里可以编辑首页内容。保存到本机会立即在当前浏览器生效；下载配置后可替换仓库里的 data/content.json，用于更新线上网站。</p>
      </section>

      <form id="adminForm" class="admin-form">
        <section class="editor-panel">
          <h2>基础信息</h2>
          <div class="form-grid">
            <label>名字<input name="profile.name" type="text"></label>
            <label>一句话定位<input name="profile.tagline" type="text"></label>
            <label>所在地区<input name="profile.location" type="text"></label>
            <label>状态<input name="profile.status" type="text"></label>
            <label class="wide">头像图片地址<input name="profile.avatar" type="url" placeholder="https://..."></label>
            <label class="wide">自我介绍<textarea name="profile.intro" rows="5"></textarea></label>
          </div>
        </section>

        <section class="editor-panel">
          <div class="panel-heading">
            <h2>联系方式</h2>
            <button class="ghost-button" type="button" data-add="links">新增</button>
          </div>
          <div class="repeat-list" id="linksEditor"></div>
        </section>

        <section class="editor-panel">
          <div class="panel-heading">
            <h2>数字卡片</h2>
            <button class="ghost-button" type="button" data-add="stats">新增</button>
          </div>
          <div class="repeat-list" id="statsEditor"></div>
        </section>

        <section class="editor-panel">
          <div class="panel-heading">
            <h2>内容模块</h2>
            <button class="ghost-button" type="button" data-add="sections">新增</button>
          </div>
          <div class="repeat-list" id="sectionsEditor"></div>
        </section>

        <section class="editor-panel">
          <div class="panel-heading">
            <h2>更新记录</h2>
            <button class="ghost-button" type="button" data-add="updates">新增</button>
          </div>
          <div class="repeat-list" id="updatesEditor"></div>
        </section>
      </form>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./assets/admin.js"></script>
  </body>
</html>
