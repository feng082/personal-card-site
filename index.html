<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>个人名片</title>
    <meta name="description" content="一个简洁的个人名片网站。">
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" data-field="name">个人名片</a>
      <nav class="nav" aria-label="主导航">
        <a href="#about">关于</a>
        <a href="#updates">更新</a>
        <a href="#contact">联系</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-inner">
          <div class="portrait" aria-hidden="true">
            <img id="avatar" alt="">
            <span id="avatarFallback">名</span>
          </div>
          <div class="hero-copy">
            <p class="kicker" id="tagline">个人名片 · 持续更新中</p>
            <h1 id="hero-title">你的名字</h1>
            <p class="intro" id="intro">这里先放一段简短的自我介绍。</p>
            <div class="hero-actions" id="heroLinks"></div>
          </div>
        </div>
      </section>

      <section class="stats-band" id="stats" aria-label="个人数据"></section>

      <section class="content-wrap" id="about">
        <div class="section-head">
          <p class="kicker">Profile</p>
          <h2>一页看懂我</h2>
        </div>
        <div class="section-grid" id="sections"></div>
      </section>

      <section class="updates" id="updates">
        <div class="section-head">
          <p class="kicker">Updates</p>
          <h2>最近更新</h2>
        </div>
        <div class="timeline" id="updatesList"></div>
      </section>

      <section class="contact" id="contact">
        <div>
          <p class="kicker">Contact</p>
          <h2>保持联系</h2>
          <p id="statusText">持续更新中</p>
        </div>
        <div class="contact-list" id="contactLinks"></div>
      </section>
    </main>

    <footer class="footer">
      <span id="footerName">个人名片</span>
      <span>Powered by Vercel static site</span>
    </footer>

    <script src="./assets/app.js"></script>
  </body>
</html>
